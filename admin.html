<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .box { max-width:350px; margin:100px auto; background:#fff; padding:20px; border-radius:8px; }
    input, button { width:100%; padding:10px; margin-top:10px; }
    button { background:#0a7cff; color:#fff; border:none; cursor:pointer; }
    .error { color:red; margin-top:10px; }
  </style>
</head>
<body>

<div class="box">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div id="msg" class="error"></div>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = "/dashboard.html";
  } else {
    document.getElementById("msg").innerText = data.error || "Login failed";
  }
}
</script>

</body>
</html>
