<!DOCTYPE html>
<html>
<head>
  <title>A’A Data Sub – Admin Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    h2 { margin-bottom:10px; }
    .card { background:#fff; padding:20px; border-radius:8px; margin-bottom:20px; }
    input, select, button {
      width:100%; padding:10px; margin-top:10px;
    }
    button {
      background:#0a7cff; color:#fff; border:none; cursor:pointer;
    }
    table {
      width:100%; border-collapse:collapse; margin-top:20px;
    }
    th, td {
      border:1px solid #ddd; padding:8px; text-align:left;
    }
    th { background:#eee; }
  </style>
</head>
<body>

<h2>Admin Dashboard – Data Plans</h2>

<div class="card">
  <h3>Add Data Plan</h3>
  <select id="network">
    <option value="">Select Network</option>
    <option>MTN</option>
    <option>Airtel</option>
    <option>Glo</option>
    <option>9mobile</option>
  </select>
  <input id="planName" placeholder="Plan Name (e.g. 1GB SME)">
  <input id="price" type="number" placeholder="Selling Price">
  <input id="apiCode" placeholder="API Code (from provider)">
  <button onclick="addPlan()">Add Plan</button>
</div>

<div class="card">
  <h3>Existing Plans</h3>
  <table>
    <thead>
      <tr>
        <th>Network</th>
        <th>Plan</th>
        <th>Price</th>
        <th>API Code</th>
      </tr>
    </thead>
    <tbody id="plans"></tbody>
  </table>
</div>

<script>
async function addPlan() {
  const network = document.getElementById("network").value;
  const planName = document.getElementById("planName").value;
  const price = document.getElementById("price").value;
  const apiCode = document.getElementById("apiCode").value;

  const res = await fetch("/admin/plans", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ network, planName, price, apiCode })
  });

  const data = await res.json();
  if (data.success) {
    alert("Plan added");
    loadPlans();
  } else {
    alert(data.error);
  }
}

async function loadPlans() {
  const res = await fetch("/admin/plans");
  const plans = await res.json();

  const tbody = document.getElementById("plans");
  tbody.innerHTML = "";

  plans.forEach(p => {
    tbody.innerHTML += `
      <tr>
        <td>${p.network}</td>
        <td>${p.planName}</td>
        <td>₦${p.price}</td>
        <td>${p.apiCode}</td>
      </tr>
    `;
  });
}

loadPlans();
</script>

</body>
</html>
