<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard – A’A Data Sub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui;
      background: #f5f7fa;
      padding: 20px;
    }
    h1 { color: #0b5ed7; }
    .card {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    button {
      background: #0b5ed7;
      color: white;
      border: none;
      font-weight: bold;
    }
    .success { color: green; margin-top: 10px; }
    .plan {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }
  </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<!-- ADD DATA PLAN -->
<div class="card">
  <b>Add Data Plan</b>

  <select id="network">
    <option value="">Select Network</option>
    <option>MTN</option>
    <option>Airtel</option>
    <option>Glo</option>
    <option>9mobile</option>
  </select>

  <input id="planName" placeholder="Plan Name (e.g MTN 1GB SME)" />
  <input id="apiCode" placeholder="SMEPlug API Code" />
  <input id="costPrice" type="number" placeholder="Cost Price (₦)" />
  <input id="sellPrice" type="number" placeholder="Selling Price (₦)" />

  <button onclick="addPlan()">Save Plan</button>
  <div id="msg" class="success"></div>
</div>

<!-- VIEW PLANS -->
<div class="card">
  <b>Existing Data Plans</b>
  <div id="plans"></div>
</div>

<script>
function addPlan() {
  const data = {
    network: network.value,
    planName: planName.value,
    apiCode: apiCode.value,
    costPrice: costPrice.value,
    sellPrice: sellPrice.value
  };

  fetch("/admin/add-plan", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    msg.innerText = "Plan added successfully";
    loadPlans();
  });
}

function loadPlans() {
  fetch("/admin/plans")
    .then(res => res.json())
    .then(plans => {
      plansDiv = document.getElementById("plans");
      plansDiv.innerHTML = "";

      plans.forEach(p => {
        plansDiv.innerHTML += `
          <div class="plan">
            <b>${p.network}</b> — ${p.planName}<br>
            Cost: ₦${p.costPrice} | Sell: ₦${p.sellPrice}
          </div>
        `;
      });
    });
}

loadPlans();
</script>

</body>
</html>
