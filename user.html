<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A’A DATA SUB – Buy Data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      background: #f5f5f5;
    }
    h2 {
      margin-bottom: 10px;
    }
    select, input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    button {
      background: #0a7cff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      background: #999;
    }
    #balanceBox {
      margin-bottom: 15px;
      font-weight: bold;
    }
    #receiptBox {
      display: none;
      border: 1px solid #ccc;
      padding: 12px;
      margin-top: 15px;
      background: white;
    }
  </style>
</head>
<body>

  <h2>Buy Data</h2>

  <div id="balanceBox">
    Balance: ₦<span id="balance">0</span>
  </div>

  <select id="planSelect">
    <option value="">Loading plans...</option>
  </select>

  <input id="phone" placeholder="Phone number" />

  <button onclick="buyData()">Buy Data</button>

  <!-- RECEIPT -->
  <div id="receiptBox">
    <h3>A’A DATA SUB – Receipt</h3>
    <p><strong>Network:</strong> <span id="rNetwork"></span></p>
    <p><strong>Plan:</strong> <span id="rPlan"></span></p>
    <p><strong>Phone:</strong> <span id="rPhone"></span></p>
    <p><strong>Amount:</strong> ₦<span id="rAmount"></span></p>
    <p><strong>Date:</strong> <span id="rDate"></span></p>
    <p><strong>Reference:</strong> <span id="rRef"></span></p>
  </div>

  <script>
    const BASE_URL = "";
    const userId = "testuser1";

    // Load wallet
    async function loadWallet() {
      const res = await fetch(`/user/wallet/${userId}`);
      const data = await res.json();
      document.getElementById("balance").innerText = data.balance || 0;
    }

    // Load plans
    async function loadPlans() {
      const res = await fetch("/admin/plans");
      const plans = await res.json();
      const select = document.getElementById("planSelect");

      select.innerHTML = "<option value=''>Select Data Plan</option>";

      plans.forEach(plan => {
        const opt = document.createElement("option");
        opt.value = plan.id;
        opt.textContent = `${plan.network} - ${plan.planName} (₦${plan.price})`;
        opt.dataset.network = plan.network;
        opt.dataset.plan = plan.planName;
        opt.dataset.price = plan.price;
        select.appendChild(opt);
      });
    }

    // Buy data
    async function buyData() {
      const planId = document.getElementById("planSelect").value;
      const phone = document.getElementById("phone").value;

      if (!planId || !phone) {
        alert("Select a plan and enter phone number");
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.innerText = "Processing...";

      try {
        const res = await fetch("/user/buy-data", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, planId, phone })
        });

        const data = await res.json();

        if (!data.success) {
          alert(data.error || "Purchase failed");
          return;
        }

        // Update balance
        document.getElementById("balance").innerText = data.balance;

        // Show receipt
        if (data.receipt) {
          document.getElementById("receiptBox").style.display = "block";
          document.getElementById("rNetwork").innerText = data.receipt.network;
          document.getElementById("rPlan").innerText = data.receipt.plan;
          document.getElementById("rPhone").innerText = data.receipt.phone;
          document.getElementById("rAmount").innerText = data.receipt.amount;
          document.getElementById("rDate").innerText = data.receipt.date;
          document.getElementById("rRef").innerText = data.receipt.reference;
        }

        alert("Data purchase successful");

      } catch (err) {
        alert("Server error");
      } finally {
        btn.disabled = false;
        btn.innerText = "Buy Data";
      }
    }

    // Init
    loadWallet();
    loadPlans();
  </script>

</body>
</html>
