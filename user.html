<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A’A Data Sub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui;
      background: #f4f6fb;
      padding: 16px;
    }
    h1 {
      color: #0b5ed7;
    }
    .card {
      background: #fff;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 6px 14px rgba(0,0,0,.06);
    }
    select, input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    button {
      background: #0b5ed7;
      color: white;
      border: none;
      font-weight: bold;
    }
    .success {
      color: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Buy Data</h1>

<div class="card">
  <select id="planSelect">
    <option value="">Select Data Plan</option>
  </select>

  <input id="phone" placeholder="Enter phone number" />

  <button onclick="buyData()">Buy Data</button>

  <div id="msg" class="success"></div>
</div>

<script>
let plans = [];

fetch("/user/plans")
  .then(res => res.json())
  .then(data => {
    plans = data;
    const select = document.getElementById("planSelect");
    data.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = `${p.network} - ${p.planName} (₦${p.sellPrice})`;
      select.appendChild(opt);
    });
  });

function buyData() {
  const planId = planSelect.value;
  const phone = document.getElementById("phone").value;

  fetch("/user/buy-data", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ planId, phone })
  })
  .then(res => res.json())
  .then(data => {
    msg.innerText = data.message || "Success";
  });
}
</script>

</body>
</html>
