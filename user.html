<!DOCTYPE html>
<html>
<head>
  <title>A’A Data Sub – Buy Data</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }
    h2 {
      margin-bottom: 10px;
    }
    .network {
      margin-bottom: 30px;
    }
    .plan {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: #0a7cff;
      color: #fff;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h2>Buy Data</h2>

<div id="plansContainer">Loading data plans…</div>

<script>
async function loadPlans() {
  const res = await fetch("/admin/plans");
  const plans = await res.json();

  const container = document.getElementById("plansContainer");
  container.innerHTML = "";

  if (!plans.length) {
    container.innerHTML = "No data plans available";
    return;
  }

  const grouped = {};

  plans.forEach(p => {
    if (!grouped[p.network]) grouped[p.network] = [];
    grouped[p.network].push(p);
  });

  for (const network in grouped) {
    const div = document.createElement("div");
    div.className = "network";
    div.innerHTML = `<h3>${network}</h3>`;

    grouped[network].forEach(p => {
      div.innerHTML += `
        <div class="plan">
          <div>
            <strong>${p.planName}</strong><br>
            ₦${p.price}
          </div>
          <button onclick="selectPlan('${p.id}')">Buy</button>
        </div>
      `;
    });

    container.appendChild(div);
  }
}

function selectPlan(planId) {
  alert("Selected plan ID: " + planId + "\n(Next step: wallet & purchase)");
}

loadPlans();
</script>

</body>
</html>
