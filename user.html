<!DOCTYPE html>
<html>
<head>
  <title>A’A Data Sub – Wallet</title>
  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    .card { background:#fff; padding:20px; border-radius:8px; }
    button { padding:10px; margin-top:10px; background:#0a7cff; color:#fff; border:none; }
  </style>
</head>
<body>

<h2>User Wallet</h2>

<div class="card">
  <div id="walletInfo">Loading…</div>
  <button onclick="initWallet()">Create / Get Wallet</button>
</div>

<script>
const userId = "testuser1";

async function initWallet() {
  const res = await fetch("/user/init-wallet", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userId })
  });

  const data = await res.json();
  render(data);
}

async function loadWallet() {
  const res = await fetch(`/user/wallet/${userId}`);
  const data = await res.json();
  render(data);
}

function render(data) {
  document.getElementById("walletInfo").innerHTML = `
    <strong>Balance:</strong> ₦${data.balance}<br><br>
    <strong>Account Number:</strong> ${data.account?.accountNumber || "—"}<br>
    <strong>Bank:</strong> ${data.account?.bankName || "—"}
  `;
}

loadWallet();
</script>

</body>
</html>
